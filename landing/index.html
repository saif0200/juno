<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Juno - the open-source control plane for coding agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c;
  --bg-2: #050507;
  --ink: #f5f5f5;
  --muted: #8a8a92;
  --muted-2: #555560;
  --line: rgba(255,255,255,0.06);
  --line-2: rgba(255,255,255,0.12);
  --tile: #15151a;
  --tile-2: #0f0f13;
  --claude: #d97757;
  --accent: rgba(255,255,255,0.92);
  --ease-apple-enter: cubic-bezier(0.18, 0.9, 0.24, 1);
  --ease-apple-focus: cubic-bezier(0.32, 0, 0.2, 1);
  --ease-apple-fade: cubic-bezier(0.25, 0.1, 0.25, 1);
}
html, body { background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; min-height: 100vh; }
.serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

/* backgrounds */
.bg-base { position: fixed; inset: 0; z-index: -3;
  background:
    radial-gradient(ellipse 1000px 600px at 50% 0%, rgba(30,30,40,0.6), transparent 70%),
    radial-gradient(ellipse 1400px 800px at 50% 120%, rgba(20,20,30,0.5), transparent 70%),
    #0a0a0c;
}
.bg-grid { position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 96px 96px;
  background-position: center;
  mask-image: radial-gradient(ellipse 80% 70% at center, black 30%, transparent 80%);
}
.bg-grain { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.06; mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

/* nav - terminal prompt bar */
.nav { position: sticky; top: 14px; z-index: 40; margin: 14px auto 0; max-width: 920px; display: flex; align-items: center; gap: 0;
  padding: 10px 14px 10px 16px; border-radius: 12px;
  background: rgba(16,16,20,0.75); border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(20px) saturate(1.2); -webkit-backdrop-filter: blur(20px) saturate(1.2);
  box-shadow: 0 10px 30px -8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  transition: transform .3s, width .3s;
}
.nav-dots { display: flex; gap: 6px; padding-right: 12px; border-right: 1px solid var(--line); margin-right: 12px; }
.nav-dots i { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.08); }
.nav-prompt { color: var(--muted-2); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.nav-prompt .host { color: #d97757; }
.nav-prompt .path { color: var(--muted); }
.nav-prompt .sigil { color: #fff; margin-left: 4px; }
.nav-cmd { margin-left: 10px; color: #e5e5e7; display: flex; align-items: center; gap: 0; flex: 1; min-width: 0; }
.nav-cmd .cmd-piece { color: var(--muted); padding: 4px 8px; border-radius: 5px; text-decoration: none; white-space: nowrap; transition: color .15s, background .15s; cursor: pointer; }
.nav-cmd .cmd-piece:hover { color: #fff; background: rgba(255,255,255,0.06); }
.nav-cmd .cmd-flag { color: #7dd3a0; }
.nav-right-term { display: flex; align-items: center; gap: 10px; padding-left: 12px; border-left: 1px solid var(--line); margin-left: 10px; flex-shrink: 0; }
.nav-cursor { display: inline-block; width: 8px; height: 14px; background: rgba(255,255,255,0.7); margin-left: 2px; animation: blink 1s steps(2) infinite; }
.nav-ghost { color: var(--muted); text-decoration: none; font-size: 12px; padding: 5px 10px; border-radius: 6px; }
.nav-ghost:hover { color: #fff; background: rgba(255,255,255,0.04); }
.nav-run { background: #fff; color: #0a0a0c; padding: 6px 11px; border-radius: 6px; font-weight: 500; font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.nav-run:hover { background: #e5e5e5; }
.brand { display: flex; align-items: center; gap: 10px; font-size: 14px; letter-spacing: 0.02em; font-weight: 500; }
.brand-mark { width: 22px; height: 22px; border-radius: 6px; background: #fff; color: #0a0a0c; display: grid; place-items: center; font-family: 'Instrument Serif', serif; font-size: 16px; font-style: italic; }
.nav-links { display: flex; gap: 28px; font-size: 13px; color: var(--muted); }
.nav-links a { color: inherit; text-decoration: none; }
.nav-links a:hover { color: #fff; }
.nav-right { display: flex; gap: 10px; align-items: center; }

/* buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; text-decoration: none; cursor: pointer; border: 1px solid transparent; transition: all .2s; white-space: nowrap; font-family: inherit; background: none; color: inherit; }
.btn-white { background: #fff; color: #0a0a0c; }
.btn-white:hover { background: #e5e5e5; }
.btn-ghost { background: rgba(255,255,255,0.03); border-color: var(--line-2); color: #fff; }
.btn-ghost:hover { background: rgba(255,255,255,0.07); }
.btn-lg { padding: 13px 22px; font-size: 14px; border-radius: 12px; }

/* hero */
.hero { position: relative; padding: 60px 24px 0; max-width: 1080px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; text-align: center; }

/* hero device composition - remote access moment, sits below the text */
.hero-stage { position: relative; width: 100vw; margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); margin-top: -40px; max-width: none; pointer-events: none; overflow: hidden; height: clamp(480px, 47.5vw, 740px); flex: 0 0 auto; align-self: stretch; -webkit-mask-image: linear-gradient(to bottom, black 0%, black 95%, transparent 100%); mask-image: linear-gradient(to bottom, black 0%, black 95%, transparent 100%); }
.hero-stage::after { display: none; }
/* shared mac layer base */
.hero-stage .mac-sharp,
.hero-stage .mac-blurred { position: absolute; left: 50%; top: 0; width: 72%; max-width: 1120px; aspect-ratio: 3860/2540; transform: translate3d(-50%, 0, 0); transform-origin: 50% 44%; backface-visibility: hidden; }
.hero-stage .mac-sharp img,
.hero-stage .mac-blurred img { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
/* sharp layer: settles first, then gently defocuses so the phone can take focus */
.hero-stage .mac-sharp { z-index: 1; opacity: 0; transform: translate3d(-50%, 6px, 0) scale(0.997); filter: blur(0.6px) brightness(0.96) saturate(0.98); animation: macSettle 1.18s var(--ease-apple-enter) 0.36s forwards, macDefocus 1.7s var(--ease-apple-focus) 2.08s forwards; }
.hero-stage .mac-sharp::after { display: none; }
/* blurred layer stays hidden; the MacBook defocuses as one stable object instead of crossfading to a duplicate. */
.hero-stage .mac-blurred { display: none; }
@keyframes macSettle {
  0% { opacity: 0; transform: translate3d(-50%, 6px, 0) scale(0.997); filter: blur(0.6px) brightness(0.96) saturate(0.98); }
  100% { opacity: 1; transform: translate3d(-50%, 0, 0) scale(1); filter: blur(0) brightness(1) saturate(1); }
}
@keyframes macDefocus {
  0% { opacity: 1; transform: translate3d(-50%, 0, 0) scale(1); filter: blur(0) brightness(1) saturate(1); }
  100% { opacity: 0.62; transform: translate3d(-50%, 0, 0) scale(0.972); filter: blur(0.5px) brightness(1) saturate(0.75); }
}
@keyframes macVignette {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
.hero-stage .mac-screen { position: absolute; top: 13.9%; left: 10.8%; right: 10.8%; bottom: 11.4%; background: transparent; overflow: hidden; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7; color: #d5d5da; padding: 18px 22px; text-align: left; }
.hero-stage .mac-screen::after { display: none; }
.hero-stage .phone-wrap { position: absolute; left: 50%; top: 14%; transform: translate3d(-50%, 14px, 0) scale(0.99); display: block; width: 15%; max-width: 220px; min-height: 0; aspect-ratio: 340/700; filter: none; z-index: 6; opacity: 0; animation: phoneEnter 1.22s var(--ease-apple-enter) 2.5s forwards; }
@keyframes phoneEnter {
  0% { opacity: 0; transform: translate3d(-50%, 14px, 0) scale(0.99); }
  100% { opacity: 1; transform: translate3d(-50%, 0, 0) scale(1); }
}
.hero-stage .phone-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 2; }
.hero-stage .phone-screen { position: absolute; top: 2.5%; left: 5.33%; right: 5.33%; bottom: 2.5%; background: #07070a; border-radius: 14.2% / 6.5%; clip-path: inset(0 round 14.2% / 6.5%); overflow: hidden; z-index: 1; font-family: 'JetBrains Mono', monospace; font-size: 8px; line-height: 1.7; color: #d5d5da; padding: 26px 10px 14px; text-align: left; opacity: 1; transform: none; }
.hero-stage .phone-screen::before { display: none; }
.hero-stage .scr-head { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--muted-2); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
.hero-stage .phone-screen .scr-head { font-size: 6.5px; letter-spacing: 0.1em; margin-bottom: 8px; }
.hero-stage .scr-head .live { width: 5px; height: 5px; border-radius: 50%; background: #7dd3a0; box-shadow: 0 0 6px #7dd3a0; }
.hero-stage .phone-screen .scr-head .live { width: 4px; height: 4px; }
.hero-stage .scr .p { color: #8ba6ff; margin-right: 6px; }
.hero-stage .scr .c { color: var(--muted-2); }
.hero-stage .scr .ok { color: #7dd3a0; }
.hero-stage .scr .w { color: #e2c08d; }
.hero-stage .scr .cursor { display: inline-block; width: 6px; height: 11px; background: #fff; vertical-align: -1px; animation: blink 1.1s steps(2) infinite; margin-left: 2px; }
.hero-stage .phone-screen .scr .cursor { width: 4px; height: 8px; }
@media (max-width: 900px) {
  .hero-stage { aspect-ratio: 4/3; margin-top: 48px; }
  .hero-stage .mac-sharp, .hero-stage .mac-blurred { width: 92%; }
  .hero-stage .phone-wrap { width: 26%; bottom: 6%; }
  .hero-stage .mac-screen { font-size: 9px; padding: 10px 14px; }
}
.hero-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 32px; display: inline-flex; align-items: center; gap: 10px; opacity: 0; transform: translateY(8px); animation: heroFade 0.8s cubic-bezier(0.2,0.7,0.2,1) 0.05s forwards; }
.hero-eyebrow::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #7dd3a0; box-shadow: 0 0 6px #7dd3a0; }
.headline { font-size: clamp(48px, 7.4vw, 96px); line-height: 0.98; letter-spacing: -0.025em; max-width: 960px; position: relative; z-index: 2; font-weight: 400; opacity: 0; transform: translateY(14px); animation: heroFade 0.9s cubic-bezier(0.2,0.7,0.2,1) 0.15s forwards; }
.headline em { font-style: italic; color: var(--muted); }
.subline { font-family: 'Inter', sans-serif; font-size: 17px; color: var(--muted); margin-top: 32px; line-height: 1.55; max-width: 520px; font-weight: 400; opacity: 0; transform: translateY(10px); animation: heroFade 0.8s cubic-bezier(0.2,0.7,0.2,1) 0.35s forwards; }
.hero-ctas { display: flex; gap: 10px; margin-top: 40px; z-index: 2; opacity: 0; transform: translateY(10px); animation: heroFade 0.8s cubic-bezier(0.2,0.7,0.2,1) 0.5s forwards; }
@keyframes heroFade { to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  .hero-stage .mac-sharp,
  .hero-stage .mac-sharp::after,
  .hero-stage .mac-blurred,
  .hero-stage .phone-wrap { animation: none; }
  .hero-stage .mac-sharp { opacity: 0.62; transform: translate3d(-50%, 0, 0) scale(0.972); filter: blur(0.5px) brightness(1) saturate(0.75); }
  .hero-stage .mac-sharp::after { opacity: 1; }
  .hero-stage .phone-wrap { opacity: 1; transform: translate3d(-50%, 0, 0) scale(1); }
}

/* agent ticker strip */
.ticker { position: relative; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.01); padding: 14px 0; overflow: hidden; margin-top: 40px; }
.ticker::before, .ticker::after { content: ''; position: absolute; top: 0; bottom: 0; width: 160px; z-index: 2; pointer-events: none; }
.ticker::before { left: 0; background: linear-gradient(90deg, #0a0a0c, transparent); }
.ticker::after { right: 0; background: linear-gradient(270deg, #0a0a0c, transparent); }
.ticker-track { display: flex; gap: 0; animation: scroll 40s linear infinite; width: max-content; }
.ticker-item { display: inline-flex; align-items: center; gap: 10px; padding: 0 28px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); border-right: 1px solid var(--line); white-space: nowrap; }
.ticker-item img { width: 18px; height: 18px; border-radius: 4px; display: block; }
.ticker-item .tag { font-family: 'Instrument Serif'; font-style: italic; color: var(--muted-2); font-size: 14px; }
@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* manifesto split */
.manifesto { max-width: 1280px; margin: 0 auto; padding: 160px 24px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 80px; align-items: start; position: relative; }
.mani-left { position: sticky; top: 120px; }
.mani-label { font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 28px; }
.mani-title { font-family: 'Instrument Serif'; font-size: clamp(56px, 7vw, 104px); line-height: 0.95; letter-spacing: -0.02em; }
.mani-title em { font-style: italic; color: var(--muted); }
.mani-sub { font-family: 'JetBrains Mono'; font-size: 14px; color: var(--muted); margin-top: 32px; line-height: 1.7; max-width: 420px; }
.mani-readme { background: #07070a; border: 1px solid var(--line-2); border-radius: 14px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8; overflow: hidden; }
.mani-readme-head { padding: 10px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--muted-2); }
.mani-readme-head .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.08); }
.mani-readme-body { padding: 24px 26px; color: #cbcbd0; }
.mani-readme-body h3 { font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400; color: #fff; margin: 22px 0 10px; letter-spacing: -0.01em; }
.mani-readme-body h3:first-child { margin-top: 0; }
.mani-readme-body p { font-size: 13px; line-height: 1.75; color: #cbcbd0; }
.mani-readme-body .comment { color: #556; }
.mani-readme-body .kw { color: #c4b5fd; }
.mani-readme-body .str { color: #a7d991; }
.mani-readme-body ul { list-style: none; padding: 0; margin: 10px 0; }
.mani-readme-body li { padding: 4px 0; padding-left: 20px; position: relative; }
.mani-readme-body li::before { content: '→'; position: absolute; left: 0; color: #d97757; }
.mani-readme-body hr { border: none; border-top: 1px dashed var(--line-2); margin: 20px 0; }

/* cinematic CTA */
.cinema { position: relative; padding: 160px 0 80px; overflow: hidden; }
.cinema-letterbox { height: 42px; background: #000; }
.cinema-inner { padding: 100px 24px; text-align: center; position: relative; max-width: 1400px; margin: 0 auto; }
.cinema-slate { font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 0.22em; color: var(--muted-2); text-transform: uppercase; margin-bottom: 40px; display: flex; justify-content: center; gap: 24px; }
.cinema-slate span { display: flex; align-items: center; gap: 8px; }
.cinema-slate .rec { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: blink 1.4s infinite; }
.cinema-title { font-family: 'Instrument Serif'; font-size: clamp(72px, 12vw, 180px); line-height: 0.9; letter-spacing: -0.035em; text-transform: none; }
.cinema-title em { font-style: italic; color: var(--muted); }
.cinema-sub { font-family: 'JetBrains Mono'; font-size: 13px; color: var(--muted); margin-top: 48px; letter-spacing: 0.05em; }
.cinema-links { display: flex; justify-content: center; gap: 40px; margin-top: 28px; font-family: 'JetBrains Mono'; font-size: 14px; }
.cinema-links a { color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 4px; transition: border-color .2s; }
.cinema-links a:hover { border-bottom-color: #fff; }
.cinema-links .arrow { display: inline-block; margin-left: 8px; transition: transform .2s; }
.cinema-links a:hover .arrow { transform: translateX(4px); }

/* unified phone+pair section */
.pocket { max-width: 1280px; margin: 0 auto; padding: 140px 24px; }
.pocket-head { display: grid; grid-template-columns: 2fr 1fr; gap: 60px; align-items: end; margin-bottom: 80px; }
.pocket-head h2 { font-family: 'Instrument Serif'; font-size: clamp(56px, 7.5vw, 112px); line-height: 0.92; letter-spacing: -0.025em; }
.pocket-head h2 em { font-style: italic; color: var(--muted); }
.pocket-head p { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 320px; }
.pocket-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 40px; align-items: center; }
.pocket-pane { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.005)); border: 1px solid var(--line); border-radius: 20px; padding: 28px; min-height: 520px; display: flex; flex-direction: column; position: relative; }
.pocket-pane h4 { font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 14px; }
.pocket-pane .big { font-family: 'Instrument Serif'; font-size: 32px; letter-spacing: -0.01em; line-height: 1.05; margin-bottom: 18px; }
.pocket-pane .body-txt { font-size: 13px; color: var(--muted); line-height: 1.6; }
.pocket-pane .flag { margin-top: auto; padding-top: 24px; display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--muted); }
.pocket-pane .flag .d { width: 5px; height: 5px; border-radius: 50%; background: #7dd3a0; box-shadow: 0 0 6px #7dd3a0; }
.pocket-mid { display: grid; place-items: center; padding: 20px 0; }

/* QR that fits the new column */
.pair-qr-wrap { background: #07070a; border: 1px solid var(--line-2); border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
.pair-qr-wrap .qr-inner { width: 160px; height: 160px; padding: 10px; background: #fff; border-radius: 8px; position: relative; margin: 0 auto; }
.pair-qr-wrap .qr { width: 100%; height: 100%; display: grid; gap: 0; }
.pair-qr-wrap .qr span { display: block; aspect-ratio: 1; }
.pair-qr-wrap .qr-logo { position: absolute; inset: 50% 0 0 50%; transform: translate(-50%,-50%); width: 26px; height: 26px; border-radius: 6px; background: #0a0a0c; border: 2px solid #fff; display: grid; place-items: center; color: #fff; font-family: 'Instrument Serif'; font-style: italic; font-size: 16px; }
.pair-code { text-align: center; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--muted-2); }
.pair-code b { color: #fff; font-weight: 400; letter-spacing: 0.08em; }

/* commands dock - interactive */
.cmd-dock { max-width: 860px; margin: 0 auto; background: #07070a; border: 1px solid var(--line-2); border-radius: 16px; overflow: hidden; box-shadow: 0 30px 70px -20px rgba(0,0,0,0.8); }
.cmd-dock-head { display: flex; align-items: center; padding: 0; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.015); }
.cmd-tab { padding: 14px 22px; font-family: 'JetBrains Mono'; font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; font-family: 'JetBrains Mono', monospace; }
.cmd-tab:hover { color: #fff; }
.cmd-tab.active { color: #fff; border-bottom-color: #fff; background: rgba(255,255,255,0.02); }
.cmd-tab .os { opacity: 0.5; margin-right: 6px; }
.cmd-dock-body { padding: 28px 30px; font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.9; color: #e5e5e7; min-height: 180px; }
.cmd-dock-body .prompt-char { color: #8ba6ff; margin-right: 10px; }
.cmd-dock-body .c { color: var(--muted-2); }
.cmd-dock-body .ok { color: #7dd3a0; margin-right: 8px; }
.cmd-copy-btn { float: right; margin-left: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--line-2); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-family: inherit; cursor: pointer; transition: all .15s; }
.cmd-copy-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

/* Terminal dock */
.terminal-dock { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.terminal { position: relative; background: #0d0d11; border: 1px solid var(--line-2); border-top-left-radius: 16px; border-top-right-radius: 16px;

.agent-card { padding: 28px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.005)); border: 1px solid var(--line); border-radius: 18px; min-height: 200px; display: flex; flex-direction: column; gap: 14px; transition: border-color .3s; }

.pair { margin-top: 80px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.005)); border: 1px solid var(--line); border-radius: 24px; padding: 48px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 40px; align-items: center; }

.install-tab { padding: 7px 14px; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; border-bottom: 1px solid transparent; margin-bottom: -1px; }

}

function PairSection() {
  const qr = React.useMemo(() => {
    const size = 21;
    const cells = [];
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const finder = (x < 7 && y < 7) || (x >= 14 && y < 7) || (x < 7 && y >= 14);
        if (finder) {
          const fx = x < 7 ? x : (x - 14);
          const fy = y < 7 ? y : (y - 14);
          const edge = fx === 0 || fx === 6 || fy === 0 || fy === 6;
          const inner = fx >= 2 && fx <= 4 && fy >= 2 && fy <= 4;
          cells.push(edge || inner ? 1 : 0);
        } else {
          const v = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
          cells.push((v - Math.floor(v)) > 0.52 ? 1 : 0);
        }
      }
    }
    return { size, cells };
  }, []);
  return (
    <section className="section" id="install">
      <div className="eyebrow">setup, briefly</div>
      <h2 className="serif section-title">Scan. Pair. <em>Forget it exists.</em></h2>
      <p className="section-lede">One terminal command. One QR scan. Your machine is now reachable from anywhere on earth, end-to-end encrypted via curve25519. No accounts. No SaaS. No BS.</p>

            <div style={{color:'#7dd3a0'}}>✓ encrypted bridge ready · curve25519</div>
            <div style={{color:'#d0d0d5', marginTop:10}}>Scan from the Juno app to pair:</div>

        ))}
      </div>
      <div className="install-body">
        {snippets[tab].map((line, i) => (
          <div key={i}><span className="prompt-char">$</span> {line}</div>
        ))}
      </div>
    </div>
  );
}

  return (
    <section className="final">

      <p>MIT-licensed. Free forever. Your phone is the remote. <span style={{color:'#fff'}}>Go build something stupid.</span></p>
      <div className="btns">
        <a href="#" className="btn btn-white btn-lg">Download for iOS</a>
        <a href="#" className="btn btn-ghost btn-lg">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fillRule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          Fork on GitHub

      </div>

}

function Footer() {
  return (
    <footer className="footer">
      <div className="footer-inner">
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <div className="brand-mark">J</div>
          <span>juno · MIT · made by devs tired of their desks</span>
        </div>
        <div className="footer-links">
          <a href="#">docs</a>
          <a href="#">github</a>
          <a href="#">discord</a>
          <a href="#">changelog</a>
          <a href="#">sponsor</a>
        </div>
      </div>
    </footer>
  );
}

function Tweaks({ values, update }) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  if (!open) return null;
  return (
    <div className="tweaks open">
      <h4>Tweaks</h4>
      <div className="tweak-row" style={{flexDirection:'column', alignItems:'stretch', gap:8}}>
        <label>Headline variant</label>
        <div className="tweak-toggle">
          {Object.keys(HEADLINES).map(k => (
            <button key={k} className={values.headline === k ? 'active' : ''} onClick={() => update('headline', k)}>
              {k.replace('variant-','').toUpperCase()}
            </button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Grain</label>
        <div className="tweak-toggle">
          <button className={values.grain ? 'active' : ''} onClick={() => update('grain', true)}>On</button>
          <button className={!values.grain ? 'active' : ''} onClick={() => update('grain', false)}>Off</button>
        </div>
      </div>
      <div className="tweak-row" style={{flexDirection:'column', alignItems:'stretch', gap:8}}>
        <label>Focused agent</label>
        <div className="tweak-toggle">
          {Object.keys(TERM_SESSIONS).map(k => (
            <button key={k} className={values.agent_tab === k ? 'active' : ''} onClick={() => update('agent_tab', k)}>
              {k}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [values, setValues] = React.useState(TWEAK_DEFAULTS);
  const [tab, setTab] = React.useState(TWEAK_DEFAULTS.agent_tab || 'claude');

  React.useEffect(() => {
    document.querySelector('.bg-grain').style.display = values.grain ? '' : 'none';
  }, [values.grain]);

  React.useEffect(() => { setTab(values.agent_tab); }, [values.agent_tab]);

  const update = (k, v) => {
    setValues(s => ({ ...s, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <>
      <Nav/>
      <Hero headline={values.headline}/>
      <AgentsSection/>
      <PhoneSection tab={tab} setTab={setTab}/>
      <PairSection/>
      <div className="section" style={{paddingTop: 0}}>
        <InstallSection/>
      </div>
      <FinalCTA/>
      <Footer/>
      <Tweaks values={values} update={update}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
